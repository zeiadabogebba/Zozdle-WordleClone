<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="supported-color-schemes" content="dark">
  <title>Zozdle</title>
  <!--[if mso]><style>* { font-family: Arial, sans-serif !important; }</style><![endif]-->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap');
    body { margin: 0; padding: 0; background: #08060f; }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#08060f;">
  <!-- preheader (hidden) -->
  <div style="display:none;max-height:0;overflow:hidden;opacity:0;mso-hide:all;">Your 6-digit Zozdle sign-in code is inside.</div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#08060f"
         style="background-color:#08060f;background-image:radial-gradient(120% 80% at 50% -10%, rgba(124,92,255,0.18), transparent 60%);">
    <tr><td align="center" style="padding:32px 16px;">

      <table role="presentation" width="480" cellpadding="0" cellspacing="0" border="0" bgcolor="#0d0a1c"
             style="width:480px;max-width:480px;background-color:#0d0a1c;border:1px solid rgba(41,231,255,0.35);border-radius:16px;">

        <!-- logo + tiles -->
        <tr><td style="padding:36px 34px 6px;" align="center">
          <div style="font-family:'Space Grotesk',Arial,sans-serif;font-size:30px;font-weight:700;letter-spacing:2px;line-height:1;">
            <span style="color:#29e7ff;text-shadow:0 0 12px rgba(41,231,255,0.7);">ZOZ</span><span style="color:#ff2d9b;text-shadow:0 0 12px rgba(255,45,155,0.7);">DLE</span>
          </div>
          <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:separate;border-spacing:5px;margin:18px auto 2px;">
            <tr>
              <td width="30" height="30" align="center" valign="middle" style="background-color:#1be38b;color:#06140d;font-family:'Space Grotesk',Arial,sans-serif;font-weight:700;font-size:15px;border-radius:6px;">Z</td>
              <td width="30" height="30" align="center" valign="middle" style="background-color:#f7c948;color:#1a1405;font-family:'Space Grotesk',Arial,sans-serif;font-weight:700;font-size:15px;border-radius:6px;">O</td>
              <td width="30" height="30" align="center" valign="middle" style="background-color:#2b2547;color:#6b6398;font-family:'Space Grotesk',Arial,sans-serif;font-weight:700;font-size:15px;border-radius:6px;">Z</td>
              <td width="30" height="30" align="center" valign="middle" style="background-color:#1be38b;color:#06140d;font-family:'Space Grotesk',Arial,sans-serif;font-weight:700;font-size:15px;border-radius:6px;">D</td>
              <td width="30" height="30" align="center" valign="middle" style="background-color:#2b2547;color:#6b6398;font-family:'Space Grotesk',Arial,sans-serif;font-weight:700;font-size:15px;border-radius:6px;">L</td>
              <td width="30" height="30" align="center" valign="middle" style="background-color:#f7c948;color:#1a1405;font-family:'Space Grotesk',Arial,sans-serif;font-weight:700;font-size:15px;border-radius:6px;">E</td>
            </tr>
          </table>
        </td></tr>

        <!-- copy -->
        <tr><td style="padding:16px 34px 0;" align="center">
          <div style="font-family:'Space Grotesk',Arial,sans-serif;font-size:12px;letter-spacing:3px;color:#9b93cf;text-transform:uppercase;">&#9656;&nbsp;Sign in&nbsp;&#9656;</div>
          <h1 style="font-family:'Space Grotesk',Arial,sans-serif;font-size:22px;line-height:1.3;color:#e9e6ff;font-weight:700;margin:14px 0 6px;">Your code</h1>
          <p style="font-family:'Space Grotesk',Arial,sans-serif;font-size:15px;line-height:1.6;color:#9b93cf;margin:0 0 22px;">Enter this code in the Zozdle app to sign in.</p>
        </td></tr>

        <!-- the code -->
        <tr><td style="padding:0 34px;" align="center">
          <div style="font-family:'Space Grotesk','Courier New',monospace;font-size:40px;font-weight:700;letter-spacing:12px;color:#f7c948;text-shadow:0 0 16px rgba(247,201,72,0.55);padding:18px 0;">{{ .Token }}</div>
        </td></tr>

        <!-- divider -->
        <tr><td style="padding:22px 34px 0;">
          <div style="height:1px;line-height:1px;font-size:0;background-color:rgba(124,92,255,0.18);">&nbsp;</div>
        </td></tr>

        <!-- footer -->
        <tr><td style="padding:18px 34px 32px;" align="center">
          <p style="font-family:'Space Grotesk',Arial,sans-serif;font-size:12px;line-height:1.6;color:#6b6398;margin:0;">This code is single-use and expires shortly. If you didn't try to sign in to Zozdle, just ignore this email.</p>
        </td></tr>

      </table>

      <div style="font-family:'Space Grotesk',Arial,sans-serif;font-size:11px;color:#4a4470;letter-spacing:1px;margin-top:18px;">ZOZDLE &middot; a neon word game</div>

    </td></tr>
  </table>
</body>
</html>
