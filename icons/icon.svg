<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#29e7ff"/>
      <stop offset="1" stop-color="#ff2d9b"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="32%" r="80%">
      <stop offset="0" stop-color="#15102c"/>
      <stop offset="1" stop-color="#08060f"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- faint grid -->
  <g stroke="#29e7ff" stroke-opacity="0.10" stroke-width="2">
