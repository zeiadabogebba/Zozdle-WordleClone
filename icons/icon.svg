    <path d="M96 320 L40 512 M256 320 L256 512 M416 320 L472 512"/>
  </g>
  <!-- neon Z -->
  <g filter="url(#glow)" fill="none" stroke="url(#g)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round">
    <path d="M150 168 H362 L150 344 H362"/>
  </g>
</svg>
